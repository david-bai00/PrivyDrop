name: CI Smoke

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            backend/pnpm-lock.yaml
            frontend/pnpm-lock.yaml

      - name: Install backend dependencies
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build backend
        working-directory: backend
        run: pnpm build

      - name: Type-check frontend
        working-directory: frontend
        run: pnpm exec tsc -p tsconfig.json --noEmit

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

      - name: Run frontend unit tests
        working-directory: frontend
        run: pnpm test:unit

  e2e-smoke:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 36379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            backend/pnpm-lock.yaml
            frontend/pnpm-lock.yaml

      - name: Install backend dependencies
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chrome
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chrome

      - name: Run smoke E2E suite
        working-directory: frontend
        env:
          PLAYWRIGHT_HEADLESS: "1"
        run: |
          pnpm exec playwright test \
            tests/e2e/regression/single-file-transfer.spec.ts \
            tests/e2e/regression/refresh-resume-single-file.spec.ts \
            tests/e2e/regression/transfer-resume-after-reconnect.spec.ts \
            tests/e2e/regression/multi-peer-transfer-resume.spec.ts \
            tests/e2e/regression/cached-id-save-mode-timeout.spec.ts

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-smoke-playwright-diagnostics
          path: |
            frontend/.playwright
            frontend/test-results
          if-no-files-found: ignore
